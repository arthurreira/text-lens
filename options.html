<!DOCTYPE html>
<html>
<head>
  <title>Text Lens Settings</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 320px;
    }

    h2 {
      font-size: 18px;
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 18px;
      font-size: 14px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    input[type="range"] {
      width: 100%;
    }

    .value {
      font-weight: bold;
    }
  </style>
</head>

<body>
  <h2>Text Lens Settings</h2>

  <label>
    <div class="row">
      <span>Font size</span>
      <span class="value" id="fontSizeValue">22</span>
    </div>
    <input type="range" id="fontSize" min="14" max="40" value="22">
  </label>

  <label>
    <div class="row">
      <span>Max width</span>
      <span class="value" id="maxWidthValue">400</span>
    </div>
    <input type="range" id="maxWidth" min="200" max="800" value="400">
  </label>

  <script src="options.js"></script>
</body>
</html>
