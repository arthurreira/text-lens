<!DOCTYPE html>
<html>
<head>
  <title>Text Lens Settings</title>

  <style>
    :root {
      --accent: #4f6df5;
      --accent-soft: rgba(79, 109, 245, 0.12);
      --bg: #f4f5f9;
      --card: #ffffff;
      --text: #1c2033;
      --text-muted: #6b7180;
      --border: #e4e6ee;
      --track: #dde0ea;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --accent: #7b93ff;
        --accent-soft: rgba(123, 147, 255, 0.16);
        --bg: #16181f;
        --card: #1f222c;
        --text: #eceef4;
        --text-muted: #9aa0ae;
        --border: #2c303d;
        --track: #363b4a;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 36px 24px;
      min-width: 440px;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 480px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .logo {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), #9b6df5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: #fff;
      flex-shrink: 0;
    }

    h1 {
      font-size: 21px;
      font-weight: 650;
      margin: 0;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-muted);
      margin: 2px 0 0;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 8px 24px;
      box-shadow: 0 1px 3px rgba(15, 20, 40, 0.06);
    }

    .setting {
      display: block;
      padding: 20px 0;
    }

    .setting + .setting {
      border-top: 1px solid var(--border);
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .label-group {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .label {
      font-size: 16px;
      font-weight: 600;
    }

    .hint {
      font-size: 13px;
      color: var(--text-muted);
    }

    .value {
      font-size: 14px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      color: var(--accent);
      background: var(--accent-soft);
      padding: 4px 12px;
      border-radius: 999px;
      white-space: nowrap;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 999px;
      background: var(--track);
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--accent);
      border: 3px solid var(--card);
      box-shadow: 0 1px 4px rgba(15, 20, 40, 0.35);
      transition: transform 0.1s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
    }

    input[type="range"]:focus-visible {
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    input[type="color"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 42px;
      padding: 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: none;
      cursor: pointer;
    }

    input[type="color"]::-webkit-color-swatch-wrapper {
      padding: 3px;
    }

    input[type="color"]::-webkit-color-swatch {
      border: none;
      border-radius: 6px;
    }

    footer {
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 20px;
    }

    footer kbd {
      font-family: inherit;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <div class="logo">&#128269;</div>
      <div>
        <h1>Text Lens</h1>
        <p class="subtitle">Hover magnifier settings</p>
      </div>
    </header>

    <div class="card">
      <label class="setting">
        <div class="row">
          <div class="label-group">
            <span class="label">Font size</span>
            <span class="hint">Size of the magnified text</span>
          </div>
          <span class="value"><span id="fontSizeValue">22</span>&nbsp;px</span>
        </div>
        <input type="range" id="fontSize" min="14" max="40" value="22">
      </label>

      <label class="setting">
        <div class="row">
          <div class="label-group">
            <span class="label">Max width</span>
            <span class="hint">Widest the lens can grow</span>
          </div>
          <span class="value"><span id="maxWidthValue">400</span>&nbsp;px</span>
        </div>
        <input type="range" id="maxWidth" min="200" max="800" value="400">
      </label>

      <label class="setting">
        <div class="row">
          <div class="label-group">
            <span class="label">Background color</span>
            <span class="hint">Text adjusts for contrast automatically</span>
          </div>
          <span class="value" id="bgColorValue">#f5f50a</span>
        </div>
        <input type="color" id="bgColor" value="#f5f50a">
      </label>

      <label class="setting">
        <div class="row">
          <div class="label-group">
            <span class="label">Opacity</span>
            <span class="hint">Transparency of the lens background</span>
          </div>
          <span class="value" id="opacityValue">96%</span>
        </div>
        <input type="range" id="opacity" min="20" max="100" value="96">
      </label>
    </div>

    <footer>Hold <kbd>Ctrl</kbd> and hover over text to magnify it</footer>
  </div>

  <script src="options.js"></script>
</body>
</html>
