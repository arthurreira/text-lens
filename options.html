<!DOCTYPE html>
<html>
<head>
  <title>Text Lens Settings</title>

  <link rel="stylesheet" href="style.css">  
</head>

<body>
  <div class="container">
    <header>
      <div class="logo"><img src="icons/icon48.svg" alt="Text Lens" style="width:32px;height:32px;display:block;"/></div>
      <div>
        <h1>Text Lens</h1>
        <p class="subtitle">Hover magnifier settings</p>
      </div>
    </header>

    <div class="card">
      <label class="setting">
        <div class="row">
          <div class="label-group">
            <span class="label">Font size</span>
            <span class="hint">Size of the magnified text</span>
          </div>
          <span class="value"><span id="fontSizeValue">22</span>&nbsp;px</span>
        </div>
        <input type="range" id="fontSize" min="14" max="40" value="22">
      </label>

      <label class="setting">
        <div class="row">
          <div class="label-group">
            <span class="label">Max width</span>
            <span class="hint">Widest the lens can grow</span>
          </div>
          <span class="value"><span id="maxWidthValue">400</span>&nbsp;px</span>
        </div>
        <input type="range" id="maxWidth" min="200" max="800" value="400">
      </label>

      <label class="setting">
        <div class="row">
          <div class="label-group">
            <span class="label">Background color</span>
            <span class="hint">Text adjusts for contrast automatically</span>
          </div>
          <span class="value" id="bgColorValue">#f5f50a</span>
        </div>
        <input type="color" id="bgColor" value="#f5f50a">
      </label>

      <label class="setting">
        <div class="row">
          <div class="label-group">
            <span class="label">Opacity</span>
            <span class="hint">Transparency of the lens background</span>
          </div>
          <span class="value" id="opacityValue">96%</span>
        </div>
        <input type="range" id="opacity" min="20" max="100" value="96">
      </label>
    </div>

    <footer>Hold <kbd>Ctrl</kbd> and hover over text to magnify it</footer>
  </div>

  <script src="options.js"></script>
</body>
</html>
